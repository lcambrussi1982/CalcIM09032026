<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!--Cabeçalho-->
    <header class="header">
        <div class="logo-area">
            <img src="imc.png" alt="Imagem de logo do site IMC">

        </div>
    </header>

    <div class="container">

        <h1>Calcule o seu índice de massa corporal</h1>

        <label for="peso">Informe seu peso em (KG)</label>
        <input type="number" id="peso" placeholder="Ex: 80" step="0.1">

        <label for="altura">Informe sua altura em (M)</label>
        <input type="number" id="altura" placeholder="Ex: 1.75" step="0.01">

        <button onclick="calcularIMC()">Calcular</button>
        <div id="resultado"></div>

    </div>
 


</body>
<script src="script.js"></script>
</html>
